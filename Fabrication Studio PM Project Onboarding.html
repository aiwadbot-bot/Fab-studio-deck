document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a0dc3e3d-a4c8-407e-ab3f-417b239c395b\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0644f732-d675-47ae-ae94-9074ad9c3759\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a06000b2-5cfd-46c9-adaa-9f68c3b41b74\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a0dc3e3d-a4c8-407e-ab3f-417b239c395b\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0644f732-d675-47ae-ae94-9074ad9c3759\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a06000b2-5cfd-46c9-adaa-9f68c3b41b74\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    /* ── Tokens ─────────────────────────── */\n    :root {\n      --f: 'Space Grotesk', system-ui, sans-serif;\n    }\n\n    /* ── Keyframes ──────────────────────── */\n    @keyframes fadeUp {\n      from { opacity:0; transform:translateY(32px); }\n      to   { opacity:1; transform:none; }\n    }\n    @keyframes fadeIn {\n      from { opacity:0; }\n      to   { opacity:1; }\n    }\n    @keyframes barGrow {\n      from { transform:scaleX(0); }\n      to   { transform:scaleX(1); }\n    }\n    @keyframes lineGrow {\n      from { width:0; opacity:0; }\n      to   { width:64px; opacity:1; }\n    }\n\n    /* ── Entrance helpers ───────────────── */\n    .a   { opacity:0; }\n    .af  { opacity:0; }\n    [data-deck-active] .a  { animation: fadeUp 0.65s cubic-bezier(.22,1,.36,1) both; }\n    [data-deck-active] .af { animation: fadeIn 0.55s ease both; }\n\n    .d1 { animation-delay:.10s !important; }\n    .d2 { animation-delay:.22s !important; }\n    .d3 { animation-delay:.36s !important; }\n    .d4 { animation-delay:.52s !important; }\n    .d5 { animation-delay:.68s !important; }\n    .d6 { animation-delay:.84s !important; }\n    .d7 { animation-delay:1.00s !important; }\n\n    /* ── Cost bars ──────────────────────── */\n    .btrack { background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }\n    .bfill  { height:100%; border-radius:3px; transform:scaleX(0); transform-origin:left center; }\n    [data-deck-active] .bfill { animation: barGrow 1.1s cubic-bezier(.25,.46,.45,.94) both; }\n\n    /* ── Step circles ───────────────────── */\n    .snum {\n      width:64px; height:64px; border-radius:50%;\n      background:#CF4A2C; color:#fff;\n      display:flex; align-items:center; justify-content:center;\n      font-weight:700; font-size:28px; flex-shrink:0;\n      font-family:'Space Grotesk',system-ui,sans-serif;\n    }\n\n    /* ── Subtle grid bg ─────────────────── */\n    .grid-bg {\n      background-image:\n        linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),\n        linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);\n      background-size:72px 72px;\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"da436870-269e-4fec-9115-327802e2a2a2#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n  <!-- ══════════════════════ SLIDE 1 – TITLE -->\n  <section data-label=\"01 Title\" data-screen-label=\"01 Title\" data-speaker-notes=\"Introduce yourself and the Fabrication Studio. This deck walks PMs through our model, what you bring to the table, and where costs come from. Keep it tight — 10 minutes max.\" style=\"font-family:var(--f); background:#0E0E0E; position:relative; overflow:hidden;\n           display:flex; flex-direction:column; justify-content:center; padding:100px;\n           background-image:linear-gradient(rgba(255,255,255,.024) 1px,transparent 1px),\n             linear-gradient(90deg,rgba(255,255,255,.024) 1px,transparent 1px);\n           background-size:72px 72px;\">\n\n    <!-- Ghost watermark -->\n    <div class=\"af\" style=\"position:absolute; right:-40px; top:50%; transform:translateY(-50%);\n         font-size:560px; font-weight:800; color:rgba(255,255,255,.018); line-height:1;\n         pointer-events:none; user-select:none; letter-spacing:-.04em; font-family:var(--f);\">FS<\u002Fdiv>\n\n    <!-- Accent bar -->\n    <div class=\"a\" style=\"width:6px; height:72px; background:#CF4A2C; margin-bottom:40px;\"><\u002Fdiv>\n\n    <!-- Eyebrow -->\n    <div class=\"a d1\" style=\"font-size:24px; letter-spacing:.12em; text-transform:uppercase;\n         color:#8C949C; font-weight:500; margin-bottom:22px;\">\n      Project Manager Onboarding\n    <\u002Fdiv>\n\n    <!-- Title -->\n    <div class=\"a d2\" style=\"font-size:92px; font-weight:700; color:#F0EAE1; line-height:1.0;\n         letter-spacing:-.025em; max-width:960px;\">\n      Working with the<br>Fabrication Studio\n    <\u002Fdiv>\n\n    <!-- Rule -->\n    <div class=\"a d3\" style=\"width:64px; height:3px; background:#CF4A2C; margin-top:48px; margin-bottom:34px;\"><\u002Fdiv>\n\n    <!-- Subline -->\n    <div class=\"a d4\" style=\"font-size:28px; color:#8C949C; font-weight:400; max-width:700px; line-height:1.4;\">\n      Where costs come from — and how to work together effectively\n    <\u002Fdiv>\n\n    <!-- Date -->\n    <div class=\"a d5\" style=\"position:absolute; bottom:100px; left:100px;\n         font-size:24px; color:rgba(255,255,255,.18); font-weight:400;\">\n      March 2026\n    <\u002Fdiv>\n\n    <!-- Bottom-right tag -->\n    <div class=\"af d2\" style=\"position:absolute; bottom:100px; right:100px;\n         font-size:24px; letter-spacing:.10em; text-transform:uppercase;\n         color:rgba(207,74,44,.5); font-weight:600;\">Fabrication Studio<\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ══════════════════════ SLIDE 2 – PHILOSOPHY -->\n  <section data-label=\"02 Philosophy\" data-screen-label=\"02 Philosophy\" data-speaker-notes=\"Three things to land: (1) We are a teaching facility — skills transfer. (2) We are your sherpas — your team participates, we guide. (3) We are NOT a service bureau — don't drop files and disappear. We also juggle multiple project teams at once, so early engagement matters.\" style=\"font-family:var(--f); background:#172030; position:relative; overflow:hidden;\n           display:flex; flex-direction:column; justify-content:center; padding:100px;\">\n\n    <div class=\"a\" style=\"font-size:24px; letter-spacing:.12em; text-transform:uppercase;\n         color:#CF4A2C; font-weight:600; margin-bottom:18px;\">Our Philosophy<\u002Fdiv>\n\n    <div class=\"a d1\" style=\"font-size:76px; font-weight:700; color:#F0EAE1; line-height:1.0;\n         letter-spacing:-.022em; margin-bottom:52px;\">We Are Your Sherpas<\u002Fdiv>\n\n    <!-- Three pillars -->\n    <div style=\"display:flex; gap:3px; margin-bottom:48px;\">\n\n      <!-- Teaching Facility — visually dominant -->\n      <div class=\"a d2\" style=\"flex:1.5; background:rgba(207,74,44,.1); border-top:4px solid #CF4A2C; padding:32px 36px 36px;\">\n        <div style=\"font-size:24px; letter-spacing:.08em; text-transform:uppercase; color:#CF4A2C;\n             font-weight:600; margin-bottom:14px;\">★ Teaching Facility<\u002Fdiv>\n        <div style=\"font-size:32px; color:#F0EAE1; font-weight:700; line-height:1.2; margin-bottom:14px;\">\n          We build skills,<br>not just parts\n        <\u002Fdiv>\n        <div style=\"font-size:24px; color:rgba(240,234,225,.65); line-height:1.55;\">\n          Every project is a learning opportunity. Your team develops real fabrication fluency — understanding the machines, the materials, and the methods — while we work alongside you.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a d3\" style=\"flex:1; background:rgba(255,255,255,.04); border-top:3px solid rgba(207,74,44,.4); padding:32px 34px 36px;\">\n        <div style=\"font-size:24px; letter-spacing:.08em; text-transform:uppercase; color:rgba(207,74,44,.7);\n             font-weight:600; margin-bottom:14px;\">A Collaborative Process<\u002Fdiv>\n        <div style=\"font-size:28px; color:#F0EAE1; font-weight:600; line-height:1.25; margin-bottom:12px;\">\n          Your team is part<br>of the work\n        <\u002Fdiv>\n        <div style=\"font-size:24px; color:rgba(240,234,225,.5); line-height:1.5;\">\n          We guide you through file prep, edits, and reviews — it's a shared effort, not a hand-off.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a d4\" style=\"flex:1; background:rgba(255,255,255,.04); border-top:3px solid rgba(207,74,44,.4); padding:32px 34px 36px;\">\n        <div style=\"font-size:24px; letter-spacing:.08em; text-transform:uppercase; color:rgba(207,74,44,.7);\n             font-weight:600; margin-bottom:14px;\">Multi-Team Shop<\u002Fdiv>\n        <div style=\"font-size:28px; color:#F0EAE1; font-weight:600; line-height:1.25; margin-bottom:12px;\">\n          We run several<br>projects at once\n        <\u002Fdiv>\n        <div style=\"font-size:24px; color:rgba(240,234,225,.5); line-height:1.5;\">\n          Plan ahead — staffing and machine time are shared across concurrent teams.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"a d5\" style=\"font-size:26px; color:rgba(240,234,225,.38); border-left:3px solid rgba(207,74,44,.35);\n         padding-left:24px; font-style:italic; max-width:1060px;\">\n      \"We specialize in translating digital geometry to physical objects — together.\"\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ══════════════════════ SLIDE 3 – PROCESS -->\n  <section data-label=\"03 Getting Started\" data-screen-label=\"03 Getting Started\" data-speaker-notes=\"Four steps. Step 1 is the most important — reach out early. We're managing multiple projects and scheduling is tight. The intake form is quick. Staffing requests are separate from the intake form — don't skip them.\" style=\"font-family:var(--f); background:#F0EAE1; position:relative; overflow:hidden;\n           display:flex; flex-direction:column; justify-content:center; padding:100px;\">\n\n    <div class=\"a\" style=\"font-size:24px; letter-spacing:.12em; text-transform:uppercase;\n         color:#CF4A2C; font-weight:600; margin-bottom:18px;\">Intake Process<\u002Fdiv>\n\n    <div class=\"a d1\" style=\"font-size:76px; font-weight:700; color:#0E0E0E; line-height:1.0;\n         letter-spacing:-.022em; margin-bottom:56px;\">How to Get Started<\u002Fdiv>\n\n    <!-- Steps row -->\n    <div style=\"display:flex; align-items:flex-start; gap:0;\">\n\n      <div class=\"a d2\" style=\"flex:1; display:flex; flex-direction:column; align-items:flex-start; padding-right:36px;\">\n        <div class=\"snum\" style=\"margin-bottom:20px;\">1<\u002Fdiv>\n        <div style=\"font-size:28px; font-weight:700; color:#0E0E0E; margin-bottom:10px;\">Connect with us<\u002Fdiv>\n        <div style=\"font-size:24px; color:#666; line-height:1.5;\">Reach out early — before you need something yesterday.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a d2\" style=\"display:flex; align-items:flex-start; padding-top:18px; color:#CF4A2C; font-size:30px; flex-shrink:0;\">→<\u002Fdiv>\n\n      <div class=\"a d3\" style=\"flex:1; display:flex; flex-direction:column; align-items:flex-start; padding:0 36px;\">\n        <div class=\"snum\" style=\"margin-bottom:20px;\">2<\u002Fdiv>\n        <div style=\"font-size:28px; font-weight:700; color:#0E0E0E; margin-bottom:10px;\">Review project needs<\u002Fdiv>\n        <div style=\"font-size:24px; color:#666; line-height:1.5;\">Staffing, materials, timeline, scope.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a d3\" style=\"display:flex; align-items:flex-start; padding-top:18px; color:#CF4A2C; font-size:30px; flex-shrink:0;\">→<\u002Fdiv>\n\n      <div class=\"a d4\" style=\"flex:1; display:flex; flex-direction:column; align-items:flex-start; padding:0 36px;\">\n        <div class=\"snum\" style=\"margin-bottom:20px;\">3<\u002Fdiv>\n        <div style=\"font-size:28px; font-weight:700; color:#0E0E0E; margin-bottom:10px;\">Fill out intake form<\u002Fdiv>\n        <div style=\"font-size:24px; color:#666; line-height:1.5;\">Project number, PM info, specs.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a d4\" style=\"display:flex; align-items:flex-start; padding-top:18px; color:#CF4A2C; font-size:30px; flex-shrink:0;\">→<\u002Fdiv>\n\n      <div class=\"a d5\" style=\"flex:1; display:flex; flex-direction:column; align-items:flex-start; padding-left:36px;\">\n        <div class=\"snum\" style=\"margin-bottom:20px;\">4<\u002Fdiv>\n        <div style=\"font-size:28px; font-weight:700; color:#0E0E0E; margin-bottom:10px;\">Submit staffing requests<\u002Fdiv>\n        <div style=\"font-size:24px; color:#666; line-height:1.5;\">For discipline-specific partners who come in and work alongside Fabrication Studio staff.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"a d6\" style=\"margin-top:48px; padding-top:24px; border-top:1px solid rgba(0,0,0,.1);\n         font-size:24px; color:#999;\">\n      The earlier you connect, the better we can plan around concurrent projects.\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ══════════════════════ SLIDE 4 – WHAT YOU BRING -->\n  <section data-label=\"04 What You Bring\" data-screen-label=\"04 What You Bring\" data-speaker-notes=\"The point person is the most critical thing. They bridge your team and the shop. File prep quality — which the point person owns — is the single biggest driver of labor cost. This isn't just a staffing request, it's a project role.\" style=\"font-family:var(--f); background:#0E0E0E; position:relative; overflow:hidden;\n           display:flex; flex-direction:column; justify-content:center; padding:100px;\n           background-image:linear-gradient(rgba(255,255,255,.024) 1px,transparent 1px),\n             linear-gradient(90deg,rgba(255,255,255,.024) 1px,transparent 1px);\n           background-size:72px 72px;\">\n\n    <!-- Decorative rings -->\n    <div class=\"af\" style=\"position:absolute; right:80px; top:50%; transform:translateY(-50%);\n         width:560px; height:560px; border-radius:50%; border:1px solid rgba(255,255,255,.05); pointer-events:none;\"><\u002Fdiv>\n    <div class=\"af d2\" style=\"position:absolute; right:158px; top:50%; transform:translateY(-50%);\n         width:404px; height:404px; border-radius:50%; border:1px solid rgba(255,255,255,.05); pointer-events:none;\"><\u002Fdiv>\n    <div class=\"af d3\" style=\"position:absolute; right:236px; top:50%; transform:translateY(-50%);\n         width:248px; height:248px; border-radius:50%; border:1px solid rgba(255,255,255,.05); pointer-events:none;\"><\u002Fdiv>\n\n    <div class=\"a\" style=\"font-size:24px; letter-spacing:.12em; text-transform:uppercase;\n         color:#CF4A2C; font-weight:600; margin-bottom:18px;\">What We Need From Your Team<\u002Fdiv>\n\n    <div class=\"a d1\" style=\"font-size:76px; font-weight:700; color:#F0EAE1; line-height:1.0;\n         letter-spacing:-.022em; margin-bottom:44px; max-width:900px;\">A Dedicated<br>Point Person<\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:20px; max-width:840px;\">\n\n      <div class=\"a d2\" style=\"display:flex; align-items:flex-start; gap:22px;\">\n        <div style=\"width:10px; height:10px; background:#CF4A2C; border-radius:50%;\n             flex-shrink:0; margin-top:13px;\"><\u002Fdiv>\n        <div style=\"font-size:30px; color:#F0EAE1; line-height:1.35; font-weight:500;\">\n          Ideally in-office, with fabrication experience or genuine interest in learning\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a d3\" style=\"display:flex; align-items:flex-start; gap:22px;\">\n        <div style=\"width:10px; height:10px; background:#CF4A2C; border-radius:50%;\n             flex-shrink:0; margin-top:13px;\"><\u002Fdiv>\n        <div style=\"font-size:30px; color:#F0EAE1; line-height:1.35; font-weight:500;\">\n          Takes on or delegates pre-fabrication file preparation\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a d4\" style=\"display:flex; align-items:flex-start; gap:22px;\">\n        <div style=\"width:10px; height:10px; background:#CF4A2C; border-radius:50%;\n             flex-shrink:0; margin-top:13px;\"><\u002Fdiv>\n        <div style=\"font-size:30px; color:#F0EAE1; line-height:1.35; font-weight:500;\">\n          Implements recommended edits and performs model repair\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div class=\"a d5\" style=\"margin-top:44px; background:rgba(207,74,44,.13);\n         border-left:4px solid #CF4A2C; padding:22px 28px; max-width:840px;\">\n      <div style=\"font-size:26px; color:rgba(240,234,225,.8); line-height:1.45;\">\n        <strong style=\"color:#CF4A2C;\">Why it matters:<\u002Fstrong>\n        File prep quality is the single biggest driver of your labor cost.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ══════════════════════ SLIDE 5 – COSTS -->\n  <section data-label=\"05 Costs\" data-screen-label=\"05 Costs\" data-speaker-notes=\"Labor is primary — file prep, machine ops, finishing, guidance. Materials: we absorb most of it; exceptions are sheet goods, plywood, HDU, and large quantities. Shipping is at cost — FedEx rates have gone up. The bar widths show relative proportion. The takeaway: invest in a capable point person and your labor cost goes down.\" style=\"font-family:var(--f); background:#0E0E0E; position:relative; overflow:hidden;\n           display:flex; flex-direction:column; justify-content:center; padding:100px;\n           background-image:linear-gradient(rgba(255,255,255,.024) 1px,transparent 1px),\n             linear-gradient(90deg,rgba(255,255,255,.024) 1px,transparent 1px);\n           background-size:72px 72px;\">\n\n    <div class=\"a\" style=\"font-size:24px; letter-spacing:.12em; text-transform:uppercase;\n         color:#CF4A2C; font-weight:600; margin-bottom:18px;\">Cost Structure<\u002Fdiv>\n\n    <div class=\"a d1\" style=\"font-size:76px; font-weight:700; color:#F0EAE1; line-height:1.0;\n         letter-spacing:-.022em; margin-bottom:48px;\">Where Your Budget Goes<\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:28px; max-width:1500px;\">\n\n      <!-- LABOR -->\n      <div class=\"a d2\">\n        <div style=\"display:flex; align-items:center; gap:18px; margin-bottom:10px;\">\n          <span style=\"font-size:26px; letter-spacing:.1em; text-transform:uppercase;\n               font-weight:700; color:#CF4A2C;\">Labor<\u002Fspan>\n          <span style=\"font-size:24px; color:rgba(240,234,225,.35); letter-spacing:.04em;\n               text-transform:uppercase; font-weight:500;\">— Primary Cost Driver<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"btrack\" style=\"height:52px; margin-bottom:10px;\">\n          <div class=\"bfill d3\" style=\"width:70%; background:linear-gradient(90deg,#CF4A2C,#E8663A);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:24px; color:rgba(240,234,225,.38);\">\n          File prep · Machine operation · Post-processing · Guidance &amp; training\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MATERIALS -->\n      <div class=\"a d4\">\n        <div style=\"display:flex; align-items:center; gap:18px; margin-bottom:10px;\">\n          <span style=\"font-size:26px; letter-spacing:.1em; text-transform:uppercase;\n               font-weight:700; color:#2966A8;\">Materials<\u002Fspan>\n          <span style=\"font-size:24px; color:rgba(240,234,225,.35); letter-spacing:.04em;\n               text-transform:uppercase; font-weight:500;\">— We Absorb Most Costs<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"btrack\" style=\"height:52px; margin-bottom:10px;\">\n          <div class=\"bfill d5\" style=\"width:20%; background:linear-gradient(90deg,#2966A8,#4086CF);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:24px; color:rgba(240,234,225,.38);\">\n          Exceptions charged to project: sheet goods · plywood · HDU · large quantities\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SHIPPING -->\n      <div class=\"a d5\">\n        <div style=\"display:flex; align-items:center; gap:18px; margin-bottom:10px;\">\n          <span style=\"font-size:26px; letter-spacing:.1em; text-transform:uppercase;\n               font-weight:700; color:#8C949C;\">Shipping<\u002Fspan>\n          <span style=\"font-size:24px; color:rgba(240,234,225,.35); letter-spacing:.04em;\n               text-transform:uppercase; font-weight:500;\">— Charged at Cost<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"btrack\" style=\"height:52px; margin-bottom:10px;\">\n          <div class=\"bfill d6\" style=\"width:10%; background:#8C949C;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:24px; color:rgba(240,234,225,.38);\">\n          Large, precious objects take time and money to ship safely — build both into your schedule and budget\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"a d7\" style=\"margin-top:32px; padding-top:22px; border-top:1px solid rgba(255,255,255,.07);\n         font-size:24px; color:rgba(240,234,225,.42); font-style:italic;\">\n      Well-prepared files + an engaged point person = the most direct path to lower labor costs.\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ══════════════════════ SLIDE 6 – TURNAROUND -->\n  <section data-label=\"06 Turnaround\" data-screen-label=\"06 Turnaround\" data-speaker-notes=\"Production time is not just machine time — file prep is part of it. We're a shared resource across multiple teams. Complex geometry takes more time. The key message: connect with us before you think you need to.\" style=\"font-family:var(--f); background:#F0EAE1; position:relative; overflow:hidden;\n           display:flex; flex-direction:column; justify-content:center; padding:100px;\">\n\n    <div class=\"a\" style=\"font-size:24px; letter-spacing:.12em; text-transform:uppercase;\n         color:#CF4A2C; font-weight:600; margin-bottom:18px;\">Production Timeline<\u002Fdiv>\n\n    <div class=\"a d1\" style=\"font-size:76px; font-weight:700; color:#0E0E0E; line-height:1.0;\n         letter-spacing:-.022em; margin-bottom:48px;\">Plan for Production Time<\u002Fdiv>\n\n    <div style=\"display:flex; gap:72px; align-items:flex-start;\">\n\n      <!-- Left: key factors -->\n      <div style=\"flex:1.3; display:flex; flex-direction:column; gap:22px;\">\n\n        <div class=\"a d2\" style=\"display:flex; align-items:flex-start; gap:24px;\">\n          <div style=\"width:44px; height:44px; background:#CF4A2C; border-radius:4px; flex-shrink:0;\n               display:flex; align-items:center; justify-content:center; margin-top:3px;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\">\n              <path d=\"M4 8H18M4 11.5H13M4 15H10\" stroke=\"white\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:28px; font-weight:700; color:#0E0E0E; margin-bottom:6px;\">Complexity drives schedule<\u002Fdiv>\n            <div style=\"font-size:24px; color:#666; line-height:1.5;\">Simple models move fast. Complex geometry, assembly, or finishing needs more machine and labor time.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"a d3\" style=\"display:flex; align-items:flex-start; gap:24px;\">\n          <div style=\"width:44px; height:44px; background:#CF4A2C; border-radius:4px; flex-shrink:0;\n               display:flex; align-items:center; justify-content:center; margin-top:3px;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\">\n              <circle cx=\"11\" cy=\"11\" r=\"8\" stroke=\"white\" stroke-width=\"2.2\"><\u002Fcircle>\n              <path d=\"M11 7V11.5L14 13.5\" stroke=\"white\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:28px; font-weight:700; color:#0E0E0E; margin-bottom:6px;\">We serve multiple teams simultaneously<\u002Fdiv>\n            <div style=\"font-size:24px; color:#666; line-height:1.5;\">Machine time and staffing are shared. Rush requests compete with other active projects.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"a d4\" style=\"display:flex; align-items:flex-start; gap:24px;\">\n          <div style=\"width:44px; height:44px; background:#CF4A2C; border-radius:4px; flex-shrink:0;\n               display:flex; align-items:center; justify-content:center; margin-top:3px;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\">\n              <rect x=\"3\" y=\"3\" width=\"16\" height=\"16\" rx=\"2\" stroke=\"white\" stroke-width=\"2.2\"><\u002Frect>\n              <path d=\"M7.5 11L10 13.5L14.5 8.5\" stroke=\"white\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:28px; font-weight:700; color:#0E0E0E; margin-bottom:6px;\">File prep time is production time<\u002Fdiv>\n            <div style=\"font-size:24px; color:#666; line-height:1.5;\">The clock starts before machines do. Account for prep in your project schedule.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <!-- Right: callout box -->\n      <div class=\"a d3\" style=\"flex:0.85; background:#0E0E0E; padding:48px; border-radius:4px;\">\n        <div style=\"font-size:24px; letter-spacing:.08em; text-transform:uppercase;\n             color:#CF4A2C; font-weight:600; margin-bottom:16px;\">The Golden Rule<\u002Fdiv>\n        <div style=\"font-size:34px; color:#F0EAE1; font-weight:700; line-height:1.25; margin-bottom:22px;\">\n          Connect with us before<br>you think you need to.\n        <\u002Fdiv>\n        <div style=\"font-size:24px; color:rgba(240,234,225,.5); line-height:1.5;\">\n          Early engagement = better scheduling, lower costs, and fewer surprises.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
